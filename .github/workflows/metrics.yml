name: Metrics

on:
  # 6시간마다 자동 갱신
  schedule:
    - cron: '0 */6 * * *'
  # 수동 실행
  workflow_dispatch:
  # workflow 파일 자체 수정 시 즉시 갱신
  push:
    branches: [main, master]
    paths:
      - '.github/workflows/metrics.yml'

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate GitHub metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: jys96
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Seoul
          config_animations: yes

          # 본인 소유 repo + organization member · collaborator 자격 repo 포함
          # (부트캠프 SKNETWORKS-FAMILY-AICAMP 산하 SKN23-* repo 들 분석 대상에 포함)
          repositories_affiliations: owner, collaborator, organization_member
          repositories_forks: yes

          # 사용 언어 통계 (가로 바 차트, repo 자체 분석)
          plugin_languages: yes
          plugin_languages_ignored: html, scss, less
          plugin_languages_limit: 8
          plugin_languages_threshold: 1%
          plugin_languages_details: percentage, lines, bytes-size
          plugin_languages_indepth: no
          plugin_languages_sections: most-used

          # 잔디 (1년 ISO calendar)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # 코드 라인 수 (added / removed)
          plugin_lines: yes
          plugin_lines_history_limit: 1

          # 활동 지표 — Recent activity 권한·데이터 부족 에러 회피 위해 비활성
          plugin_activity: no

          # 결과 SVG 파일명·커밋 위치
          filename: github-metrics.svg
          output_action: commit
          committer_branch: main
          committer_message: "chore: update github metrics [skip ci]"
